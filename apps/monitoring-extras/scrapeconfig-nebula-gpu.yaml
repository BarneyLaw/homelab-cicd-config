apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: nebula-gpu
  namespace: monitoring          # must match Prometheus's namespace (default operator scope)
  labels:
    release: kube-prom           # must match spec.scrapeConfigSelector — verify with the command above
spec:
  staticConfigs:
    - targets:
        - "192.168.1.248:9835"   # nebula, nvidia_gpu_exporter default port
      labels:
        instance: "nebula"       # so GPU panels join the same $node dropdown
        node: "nebula"
        job: "nvidia-gpu"
  scrapeInterval: 30s
  scrapeTimeout: 10s
  metricsPath: /metrics