apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portfolio
resources:
- deployment.yaml
- service.yaml
- portfolio-ingress.yaml
  # name MUST be all-lowercase and match the built image exactly (case-sensitive).
  # `kustomize edit set image` rewrites newTag below.
images:
- name: ghcr.io/barneylaw/portfolio-site
  newName: ghcr.io/barneylaw/portfolio-site
  newTag: cf098ee
