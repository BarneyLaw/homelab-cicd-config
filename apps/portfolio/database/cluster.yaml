apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: portfolio-db
  namespace: portfolio
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: portfolio
      owner: portfolio
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-backups/portfolio-db
      endpointURL: http://192.168.1.248:3900
      s3Credentials:
        accessKeyId:
          name: minio-creds
          key: ACCESS_KEY
        secretAccessKey:
          name: minio-creds
          key: SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"