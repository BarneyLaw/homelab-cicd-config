# apps/cert-manager-issuer/certificate.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-packetcraft-wildcard
  namespace: traefik                     # see note below about namespace
spec:
  secretName: lab-packetcraft-wildcard-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  commonName: "*.lab.packetcraft.dev"
  dnsNames:
    - "*.lab.packetcraft.dev"