prometheus-node-exporter:
  extraArgs:
  - --collector.hwmon
  - --collector.thermal_zone
  - --collector.rapl
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: false
    runAsUser: 0
  daemonsetAnnotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password