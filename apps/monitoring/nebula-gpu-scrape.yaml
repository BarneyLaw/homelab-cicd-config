apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: nebula-gpu
  namespace: monitoring
  labels:
    release: kube-prom          # must match the Prometheus serviceMonitorSelector/scrapeConfigSelector
spec:
  staticConfigs:
    - targets:
        - "192.168.1.248:9835"
      labels:
        instance: "nebula"       # so it joins your $node dropdown cleanly later
        node: "nebula"