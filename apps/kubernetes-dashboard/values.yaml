# kubernetes-dashboard Helm values — minimal, read-only-oriented.
app:
  # We use our own read-only SA for login; don't let the chart create a
  # privileged one and don't skip-login into admin.
  settings:
    global:
      # sane defaults; adjust in-UI later if you want
      itemsPerPage: 25
      logsAutoRefreshTimeInterval: 5

# Pin the moving parts to the always-on control-plane node.
nodeSelector:
  kubernetes.io/hostname: deus

# The chart's default RBAC creates a broad clusterrole; we don't want the
# chart's SA to be the way you log in. The chart still needs a small amount
# of RBAC to run (metrics scraper etc.), which is fine — that's the app's
# own service identity, separate from your login SA above.

# Disable the bundled cert-manager / nginx-ingress sub-installs — you already
# own ingress (Traefik) and TLS (Cloudflare edge / cert-manager). Letting the
# chart pull these in would collide with your single-routing-brain rule.
cert-manager:
  enabled: false
nginx:
  enabled: false
metrics-server:
  enabled: false   # you already have metrics via kube-prometheus-stack